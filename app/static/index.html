<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InfluenceMap</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --bg2: #131313;
      --bg3: #181818;
      --border: #242424;
      --text: #c8c8c8;
      --text-dim: #484848;
      --text-bright: #efefef;
      --accent: #d4f044;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-bright);
      letter-spacing: 0.02em;
    }
    .logo span { color: var(--accent); }
    .tagline {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .stat {
      padding: 14px 28px;
      border-right: 1px solid var(--border);
    }
    .stat .k {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .stat .v {
      font-family: var(--mono);
      font-size: 20px;
      color: var(--text-bright);
      margin-top: 2px;
    }

    /* ── Layout ── */
    .shell { display: flex; height: calc(100vh - 89px); }

    /* ── Sidebar ── */
    aside {
      width: 220px;
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .aside-block {}
    .aside-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text-bright);
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 8px;
      outline: none;
    }
    .field input:focus { border-color: #333; }

    .btn {
      width: 100%;
      padding: 7px 10px;
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.04em;
      border: none;
    }
    .btn-white { background: var(--text-bright); color: #000; }
    .btn-white:hover { background: var(--accent); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      margin-top: 6px;
    }
    .btn-ghost:hover { border-color: #555; color: var(--text); }

    .scrape-status {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 8px;
      line-height: 1.6;
    }
    .scrape-status.running { color: var(--accent); }

    .progress {
      height: 1px;
      background: var(--border);
      margin-top: 8px;
      display: none;
    }
    .progress.on { display: block; }
    .progress-inner {
      height: 1px;
      background: var(--accent);
      width: 0%;
      transition: width 35s linear;
    }

    /* ── Content ── */
    main {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 2;
    }
    .count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }
    .count b { color: var(--text-bright); }
    .btn-csv {
      font-family: var(--mono);
      font-size: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 5px 10px;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .btn-csv:hover { border-color: #555; color: var(--text); }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 8px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      background: var(--bg);
      position: sticky;
      top: 37px;
    }
    tbody tr { border-bottom: 1px solid #161616; }
    tbody tr:hover { background: var(--bg2); }
    tbody td { padding: 10px 14px; vertical-align: middle; }

    .num {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }
    .uname {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-bright);
    }
    .fname {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }
    .metric {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
    }

    .score {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      padding: 2px 0;
    }
    .score.hi { color: var(--accent); }
    .score.md { color: #f0a844; }
    .score.lo { color: var(--text-dim); }

    .tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      background: var(--bg3);
      padding: 2px 6px;
      margin: 1px;
      display: inline-block;
    }

    a.vlink {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      text-decoration: none;
    }
    a.vlink:hover { color: var(--accent); }

    .empty {
      padding: 60px;
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>▸</span> InfluenceMap</div>
  <div class="tagline">B2B micro-influencer lead generator // marketing agencies</div>
</header>

<div class="stats">
  <div class="stat">
    <div class="k">Influencers</div>
    <div class="v" id="s-inf">—</div>
  </div>
  <div class="stat">
    <div class="k">Posts Scraped</div>
    <div class="v" id="s-posts">—</div>
  </div>
  <div class="stat">
    <div class="k">Last Updated</div>
    <div class="v" style="font-size:13px;margin-top:6px;" id="s-upd">—</div>
  </div>
</div>

<div class="shell">
  <aside>
    <div class="aside-block">
      <div class="aside-label">Filter</div>
      <div class="field">
        <label>min engagement</label>
        <input type="number" id="min-eng" value="0" min="0"/>
      </div>
      <div class="field">
        <label>min posts</label>
        <input type="number" id="min-posts" value="1" min="1"/>
      </div>
      <div class="field">
        <label>niche keyword</label>
        <input type="text" id="niche" placeholder="food, cafe, fitness..."/>
      </div>
      <button class="btn btn-white" onclick="loadTable()">run query</button>
    </div>

    <div class="aside-block">
      <div class="aside-label">Scrape Niche</div>
      <div class="field">
        <label>hashtag (no #)</label>
        <input type="text" id="new-tag" placeholder="e.g. yogapune"/>
      </div>
      <button class="btn btn-ghost" onclick="doScrape()">⟳ scrape &amp; index</button>
      <div class="progress" id="prog"><div class="progress-inner" id="prog-fill"></div></div>
      <div class="scrape-status" id="scrape-st"></div>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="count" id="count">—</div>
      <button class="btn-csv" onclick="exportCSV()">export .csv</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>account</th>
          <th>posts</th>
          <th>avg likes</th>
          <th>avg cmts</th>
          <th>eng. score</th>
          <th>niches</th>
          <th>link</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8"><div class="empty">loading...</div></td></tr>
      </tbody>
    </table>
  </main>
</div>

<script>
  let data = [];

  function scoreClass(s) {
    return s >= 50 ? "hi" : s >= 15 ? "md" : "lo";
  }

  function renderTags(niches) {
    if (!niches) return '<span class="tag">—</span>';
    return niches.split(",").slice(0, 2).map(n =>
      `<span class="tag">#${n.trim()}</span>`
    ).join("");
  }

  async function loadStats() {
    const r = await fetch("/api/stats").then(r => r.json());
    document.getElementById("s-inf").textContent = r.total_influencers;
    document.getElementById("s-posts").textContent = r.total_posts;
    document.getElementById("s-upd").textContent = (r.last_updated || "never").slice(0, 16);
  }

  async function loadTable() {
    const eng = document.getElementById("min-eng").value || 0;
    const posts = document.getElementById("min-posts").value || 1;
    const niche = document.getElementById("niche").value || "";
    const r = await fetch(`/api/influencers?min_engagement=${eng}&min_posts=${posts}&niche=${encodeURIComponent(niche)}`).then(r => r.json());
    data = r.influencers;

    document.getElementById("count").innerHTML = `<b>${r.count}</b> results`;

    const tb = document.getElementById("tbody");
    if (!r.count) {
      tb.innerHTML = `<tr><td colspan="8"><div class="empty">no results</div></td></tr>`;
      return;
    }

    tb.innerHTML = r.influencers.map((x, i) => `
      <tr>
        <td class="num">${i + 1}</td>
        <td>
          <div class="uname">@${x.owner_username}</div>
          <div class="fname">${x.owner_full_name || ""}</div>
        </td>
        <td class="metric">${x.total_posts}</td>
        <td class="metric">${x.avg_likes}</td>
        <td class="metric">${x.avg_comments}</td>
        <td><span class="score ${scoreClass(x.engagement_score)}">${x.engagement_score}</span></td>
        <td>${renderTags(x.niches)}</td>
        <td><a class="vlink" href="${x.profile_url}" target="_blank">open ↗</a></td>
      </tr>
    `).join("");
  }

  function exportCSV() {
    if (!data.length) return;
    const h = Object.keys(data[0]).join(",");
    const rows = data.map(r => Object.values(r).map(v => `"${v}"`).join(",")).join("\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([h + "\n" + rows], { type: "text/csv" }));
    a.download = "influencemap.csv";
    a.click();
  }

  async function doScrape() {
    const tag = document.getElementById("new-tag").value.trim();
    if (!tag) { alert("enter a hashtag"); return; }

    const st = document.getElementById("scrape-st");
    const prog = document.getElementById("prog");
    const fill = document.getElementById("prog-fill");

    st.textContent = `indexing #${tag}...`;
    st.className = "scrape-status running";
    prog.className = "progress on";
    fill.style.width = "0%";
    setTimeout(() => fill.style.width = "100%", 100);

    try {
      const r = await fetch(`/api/scrape?hashtag=${encodeURIComponent(tag)}`, {
        method: "POST", headers: { "Content-Type": "application/json" }
      }).then(r => r.json());
      st.textContent = r.message;
      setTimeout(() => {
        loadStats(); loadTable();
        st.className = "scrape-status";
        prog.className = "progress";
        fill.style.width = "0%";
      }, 35000);
    } catch(e) {
      st.textContent = `error: ${e.message}`;
      st.className = "scrape-status";
    }
  }

  loadStats();
  loadTable();
</script>
</body>
</html>
